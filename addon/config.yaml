name: Hass AI Gateway
version: "1.2.5"
slug: hass_ai_gateway
description: >-
  Control Home Assistant with a local LLM via voice, Telegram, and notifications.
  Three Python services in one container, each individually toggleable.
url: https://github.com/wolpa29/hass-ai-gateway
image: "ghcr.io/wolpa29/hass-ai-gateway/{arch}-addon-hass_ai_gateway"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
hassio_api: false
homeassistant_api: true
host_network: false
map:
  - share:rw
  - addon_config:rw
ports:
  "8765/tcp": 8765
  "8766/tcp": 8766
ports_description:
  "8765/tcp": Voice Gateway HTTP API (RPi/ESP32 audio + text)
  "8766/tcp": Notify Gateway HTTP API (HA webhook target)

options:
  language: "de"
  services:
    voice_gateway: true
    notify_gateway: true
    telegram_bot: true
  telegram:
    bot_token: ""
    chat_id: 0
  home_assistant:
    url: "http://supervisor/core"
    token: ""
    service_timeout: 15
    dry_run: false
  lmstudio:
    url: ""
    model: "qwen2.5-7b-instruct"
    api_key: ""
    timeout: 30
    temperature: 0.1
    no_think: true
    context_length: 8000
    mcp_allowed_tools: "HassTurnOn,HassTurnOff,HassCancelAllTimers,HassBroadcast,HassClimateSetTemperature,HassLightSet,GetDateTime,GetLiveContext"
    max_actions_per_command: 0
  whisper:
    url: ""
    model: "deepdml/faster-whisper-large-v3-turbo-ct2"
  tts:
    url: ""
    voice: "de_DE-thorsten-low"
  gateways:
    voice_port: 8765
    voice_api_key: ""
    voice_telegram_push: true
    voice_reply_with_transcript: true
    notify_port: 8766
    notify_http_timeout: 10
  rag:
    enabled: true
    top_k: 15
    distance_threshold: 0.0
    keyword_boost: 0.3
    embed_url: ""
    embed_api_key: ""
    embed_model: "text-embedding-nomic-embed-text-v2-moe"
    embed_dim: 768
  preprocessor:
    enabled: true
    url: ""
    api_key: ""
    model: ""
    timeout: 30
    temperature: 0.1
  advanced:
    fallback_mode: 0
    fallback_rest_max_entities: 0
    fallback_rest_domains: "light,switch,sensor,binary_sensor,climate,automation,cover"
    history_size: 0
    history_include_assistant: true
    history_append_executions: false

schema:
  language: "list(de|en)"
  services:
    voice_gateway: bool
    notify_gateway: bool
    telegram_bot: bool
  telegram:
    bot_token: password?
    chat_id: int
  home_assistant:
    url: str
    token: password?
    service_timeout: int(1,300)
    dry_run: bool
  lmstudio:
    url: str?
    model: str?
    api_key: password?
    timeout: int(1,600)
    temperature: float(0,2)
    no_think: bool
    context_length: int(512,131072)
    mcp_allowed_tools: str?
    max_actions_per_command: int(0,100)
  whisper:
    url: str?
    model: str?
  tts:
    url: str?
    voice: str?
  gateways:
    voice_port: port
    voice_api_key: password?
    voice_telegram_push: bool
    voice_reply_with_transcript: bool
    notify_port: port
    notify_http_timeout: int(1,300)
  rag:
    enabled: bool
    top_k: int(1,100)
    distance_threshold: float(0,10)
    keyword_boost: float(0,5)
    embed_url: str?
    embed_api_key: password?
    embed_model: str?
    embed_dim: int(64,8192)
  preprocessor:
    enabled: bool
    url: str?
    api_key: password?
    model: str?
    timeout: int(1,600)
    temperature: float(0,2)
  advanced:
    fallback_mode: int(0,2)
    fallback_rest_max_entities: int(0,10000)
    fallback_rest_domains: str
    history_size: int(0,100)
    history_include_assistant: bool
    history_append_executions: bool
