name: Hass AI Gateway
version: "1.1.0"
slug: hass_ai_gateway
description: >-
  Voice + Telegram + Notify gateways for Home Assistant.
  Runs three Python services in one container, each individually toggleable.
url: https://github.com/wolpay29/hass-ai-gateway
image: "ghcr.io/wolpay29/hass-ai-gateway/{arch}-addon-hass_ai_gateway"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
hassio_api: false
homeassistant_api: true
host_network: false
map:
  - share:rw
  - addon_config:rw
ports:
  "8765/tcp": 8765
  "8766/tcp": 8766
ports_description:
  "8765/tcp": Voice Gateway HTTP API (RPi/ESP32 audio + text)
  "8766/tcp": Notify Gateway HTTP API (HA webhook target)

options:
  language: "de"
  enable_voice_gateway: true
  enable_notify_gateway: true
  enable_telegram_bot: true

  telegram_bot_token: ""
  telegram_chat_id: 0

  ha_url: "http://supervisor/core"
  ha_token: ""
  ha_service_timeout: 15
  ha_dry_run: false

  whisper_url: ""
  whisper_model: "deepdml/faster-whisper-large-v3-turbo-ct2"

  lmstudio_url: ""
  lmstudio_model: "qwen2.5-7b-instruct"
  lmstudio_api_key: ""
  lmstudio_timeout: 30
  lmstudio_temperature: 0.1
  lmstudio_no_think: true
  lmstudio_context_length: 8000
  lmstudio_mcp_allowed_tools: "HassTurnOn,HassTurnOff,HassCancelAllTimers,HassBroadcast,HassClimateSetTemperature,HassLightSet,GetDateTime,GetLiveContext"
  lmstudio_max_actions_per_command: 0

  voice_port: 8765
  voice_api_key: ""
  voice_telegram_push: true
  voice_reply_with_transcript: true

  notify_port: 8766
  notify_http_timeout: 10

  tts_url: ""
  tts_voice: "de_DE-thorsten-low"

  rag_enabled: true
  rag_top_k: 15
  rag_distance_threshold: 0.0
  rag_keyword_boost: 0.3
  rag_embed_url: ""
  rag_embed_model: "text-embedding-nomic-embed-text-v2-moe"
  rag_embed_dim: 768

  preprocessor_enabled: true
  preprocessor_url: ""
  preprocessor_api_key: ""
  preprocessor_model: ""
  preprocessor_timeout: 30
  preprocessor_temperature: 0.1

  fallback_mode: 0
  fallback_rest_max_entities: 0
  fallback_rest_domains: "light,switch,sensor,binary_sensor,climate,automation,cover"

  history_size: 0
  history_include_assistant: true
  history_append_executions: false

schema:
  language: "list(de|en)"
  enable_voice_gateway: bool
  enable_notify_gateway: bool
  enable_telegram_bot: bool

  telegram_bot_token: password?
  telegram_chat_id: int

  ha_url: str
  ha_token: password?
  ha_service_timeout: int(1,300)
  ha_dry_run: bool

  whisper_url: str?
  whisper_model: str?

  lmstudio_url: str?
  lmstudio_model: str?
  lmstudio_api_key: password?
  lmstudio_timeout: int(1,600)
  lmstudio_temperature: float(0,2)
  lmstudio_no_think: bool
  lmstudio_context_length: int(512,131072)
  lmstudio_mcp_allowed_tools: str?
  lmstudio_max_actions_per_command: int(0,100)

  voice_port: port
  voice_api_key: password?
  voice_telegram_push: bool
  voice_reply_with_transcript: bool

  notify_port: port
  notify_http_timeout: int(1,300)

  tts_url: str?
  tts_voice: str?

  rag_enabled: bool
  rag_top_k: int(1,100)
  rag_distance_threshold: float(0,10)
  rag_keyword_boost: float(0,5)
  rag_embed_url: str?
  rag_embed_model: str?
  rag_embed_dim: int(64,8192)

  preprocessor_enabled: bool
  preprocessor_url: str?
  preprocessor_api_key: password?
  preprocessor_model: str?
  preprocessor_timeout: int(1,600)
  preprocessor_temperature: float(0,2)

  fallback_mode: int(0,2)
  fallback_rest_max_entities: int(0,10000)
  fallback_rest_domains: str

  history_size: int(0,100)
  history_include_assistant: bool
  history_append_executions: bool
