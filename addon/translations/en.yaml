configuration:
  language:
    name: Language
    description: Language for UI strings, LLM prompts, and Whisper transcription. `de` or `en`.

  services:
    name: Services
    description: Toggle each service on or off. A disabled service sleeps but stays in the container.
    fields:
      voice_gateway:
        name: Enable Voice Gateway
        description: HTTP API on port 8765 for RPi / ESP32 audio clients.
      notify_gateway:
        name: Enable Notify Gateway
        description: HTTP API on port 8766 that Home Assistant posts notifications to. Fans out to TTS and / or Telegram.
      telegram_bot:
        name: Enable Telegram Bot
        description: Long-polling Telegram bot for voice + text commands and inline menus.

  telegram:
    name: Telegram
    description: Bot credentials. Required when the Telegram Bot is enabled.
    fields:
      bot_token:
        name: Bot Token
        description: Required. Get from @BotFather.
      chat_id:
        name: Chat ID
        description: Required. Your numeric Telegram user ID — the bot only responds to this ID.

  home_assistant:
    name: Home Assistant
    description: Connection to the HA REST API.
    fields:
      url:
        name: URL
        description: Default `http://supervisor/core` works inside the add-on. Only change this for external HA instances.
      token:
        name: Token
        description: Leave empty to use the auto-injected supervisor token. Only needed for external HA instances.
      service_timeout:
        name: Service call timeout (s)
        description: How long to wait for a HA service call before giving up. Default 15 s.
      dry_run:
        name: Dry-run mode
        description: When on, service calls are only logged — no real HA actions are executed. State reads stay live. Useful for testing.

  lmstudio:
    name: LM Studio
    description: Local LLM server (OpenAI-compatible). Used for command parsing, intent classification, and fallback. URL and model are required when Voice Gateway or Telegram Bot is enabled.
    fields:
      url:
        name: URL
        description: Required. e.g. `http://192.168.1.10:1234`.
      model:
        name: Model
        description: Required. The model name as shown in LM Studio. Must be loaded and running.
      api_key:
        name: API key
        description: Leave empty if LM Studio has no authentication enabled.
      timeout:
        name: Timeout (s)
        description: How long to wait for an LLM response before failing. Default 30 s. Increase for slow hardware or large models.
      temperature:
        name: Temperature
        description: Controls randomness. 0.0–0.3 recommended for reliable action parsing. Default 0.1.
      no_think:
        name: Suppress think tags
        description: Strips `<think>` blocks from the output. Enable for reasoning models (e.g. QwQ, DeepSeek-R1) to avoid broken JSON responses.
      context_length:
        name: Context length
        description: Token context window sent to the model. Default 8000. Only relevant for MCP fallback (mode 2). Increase if MCP calls fail with context errors.
      mcp_allowed_tools:
        name: MCP allowed tools
        description: Comma-separated whitelist of HA MCP tools. Only used in fallback mode 2. Leave empty to allow all tools.
      max_actions_per_command:
        name: Max actions per command
        description: Limits how many HA actions the LLM can execute per request. 0 = unlimited.

  whisper:
    name: Whisper (Speech-to-Text)
    description: External STT server (OpenAI-compatible /v1/audio/transcriptions). Required for voice input. Leave empty for text-only operation.
    fields:
      url:
        name: URL
        description: Leave empty to disable voice input. e.g. `http://192.168.1.10:10300/v1/audio/transcriptions`. Use `infra/faster_whisper/` for a ready-to-use setup.
      model:
        name: Model
        description: Model name sent to the Whisper server. Must match what the server has loaded. Default `deepdml/faster-whisper-large-v3-turbo-ct2`.

  tts:
    name: TTS (Text-to-Speech)
    description: External TTS server for voice replies. Leave empty to return text-only JSON from the voice gateway.
    fields:
      url:
        name: URL
        description: Leave empty to disable TTS. e.g. `http://192.168.1.10:10400/tts`. Use `infra/tts_server/` for a ready-to-use setup.
      voice:
        name: Voice ID
        description: Voice identifier sent to the TTS server. e.g. `de_DE-thorsten-low`. Must match what the server supports.

  gateways:
    name: Gateway Ports & Auth
    description: Network settings for the Voice Gateway and Notify Gateway.
    fields:
      voice_port:
        name: Voice Gateway port
        description: Port the voice gateway listens on. Default 8765. If you change this, also update the Network section in the add-on UI.
      voice_api_key:
        name: Voice Gateway API key
        description: Optional shared secret. When set, clients must send `X-Api-Key: <key>` with every request. Leave empty for open access on a trusted LAN.
      voice_telegram_push:
        name: Forward voice replies to Telegram
        description: Sends a Telegram message for every voice command processed by the gateway. Requires the Telegram Bot to be enabled.
      voice_reply_with_transcript:
        name: Include transcript in voice reply
        description: Adds the recognised speech text to the Telegram receipt. Useful for spotting STT errors.
      notify_port:
        name: Notify Gateway port
        description: Port the notify gateway listens on. Default 8766. If you change this, also update the Network section in the add-on UI.
      notify_http_timeout:
        name: Notify HTTP timeout (s)
        description: How long to wait when forwarding notifications to external targets (TTS, Telegram). Default 10 s.

  rag:
    name: RAG (Entity Retrieval)
    description: Semantic vector search over HA entities. Finds the most relevant entities per request without listing them all in every prompt. After changing entities, trigger a rebuild via /rag_rebuild in Telegram.
    fields:
      enabled:
        name: Enable RAG
        description: When on, all HA entities are indexed in a vector DB. When off, only entities defined in entities.yaml are used.
      top_k:
        name: Top-K candidates
        description: How many entities the vector search returns per request. Default 15. Lower = faster + smaller prompt; higher = better recall for large installations.
      keyword_boost:
        name: Keyword boost
        description: Boosts entities whose keywords appear in the transcript. 0 = pure vector search. 0.3 (default) gives a moderate keyword preference.
      distance_threshold:
        name: Distance threshold
        description: Drops candidates above this vector distance. 0 = off (default). The best candidate is always kept regardless. Tune by looking at the `Top-K: [(id, dist)]` log line.
      embed_url:
        name: Embedding URL
        description: Leave empty to reuse the LM Studio URL. Only set this if the embedding model runs on a different server.
      embed_api_key:
        name: Embedding API key
        description: Leave empty to reuse the LM Studio API key. Only needed if the embedding server requires separate authentication.
      embed_model:
        name: Embedding model
        description: Must be loaded and running on the embedding server. Default `text-embedding-nomic-embed-text-v2-moe`. Must match `embed_dim`.
      embed_dim:
        name: Embedding dimension
        description: Must match the output dimension of the embedding model. Default 768. Changing this triggers an automatic index rebuild.

  preprocessor:
    name: LLM Preprocessor
    description: Small extra LLM call before the main pipeline. Classifies intent (command / smalltalk), fixes STT errors, and rewrites the query using conversation history for better RAG results.
    fields:
      enabled:
        name: Enable Preprocessor
        description: When on, one additional LLM call runs before every request. Improves accuracy for vague or follow-up commands at the cost of extra latency.
      url:
        name: URL
        description: Leave empty to reuse the LM Studio URL. Useful if you want a separate fast model for preprocessing.
      api_key:
        name: API key
        description: Leave empty to reuse the LM Studio API key.
      model:
        name: Model
        description: Leave empty to reuse the LM Studio model. A small, fast model is recommended (e.g. Qwen 1.5B).
      timeout:
        name: Timeout (s)
        description: How long to wait for the preprocessor response. Default 30 s.
      temperature:
        name: Temperature
        description: Controls randomness for the preprocessor call. Default 0.1.

  advanced:
    name: Fallback & History
    description: What to do when no entity matches, and how much conversation history the LLM sees.
    fields:
      fallback_mode:
        name: Fallback mode
        description: "What happens when the parser finds no matching entity. 0 = return an error (default). 1 = fetch all live HA states and retry (beta). 2 = hand off to LM Studio with HA MCP tools (beta)."
      fallback_rest_max_entities:
        name: Fallback REST max entities
        description: Limits how many entities are included in the mode-1 fallback prompt. 0 = no limit. Set a cap (e.g. 200) to avoid hitting the context window.
      fallback_rest_domains:
        name: Fallback REST domains
        description: Comma-separated HA domains included in the mode-1 fallback. Restricts the entity list to relevant domains only.
      history_size:
        name: Conversation history size
        description: How many past user turns the LLM sees per chat session. 0 = no history (default). Each channel (Telegram, RPi) has its own history unless they share a chat ID.
      history_include_assistant:
        name: Include assistant replies in history
        description: When on, the LLM also sees its own previous replies. Enables more natural follow-up handling.
      history_append_executions:
        name: Append executed actions to history
        description: Adds a summary of executed HA actions to the history so follow-ups like "turn it off again" or "did it work?" have context.
