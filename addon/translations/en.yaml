configuration:
  language:
    name: Language
    description: Language for UI strings, LLM prompts, and Whisper transcription. `de` or `en`.

  services:
    name: Services
    description: "Toggle each service on or off. A disabled service sleeps but stays in the container. | Voice Gateway: HTTP API on port 8765 for RPi / ESP32 audio clients. | Notify Gateway: HTTP API on port 8766 for HA notifications, fans out to TTS and Telegram. | Telegram Bot: Long-polling bot for voice + text commands and inline menus."
    voice_gateway:
      name: Enable Voice Gateway
    notify_gateway:
      name: Enable Notify Gateway
    telegram_bot:
      name: Enable Telegram Bot

  telegram:
    name: Telegram
    description: "Required when Telegram Bot is enabled. | Bot Token: Get from @BotFather. | Chat ID: Your numeric Telegram user ID — the bot only responds to this ID."
    bot_token:
      name: Bot Token
    chat_id:
      name: Chat ID

  home_assistant:
    name: Home Assistant
    description: "Connection to the HA REST API. | URL: Default http://supervisor/core works inside the add-on. Only change for external HA instances. | Token: Leave empty to use the auto-injected supervisor token. | Service Timeout: Seconds to wait for a HA service call. Default 15. | Dry-run: When on, service calls are only logged — no real HA actions executed."
    url:
      name: URL
    token:
      name: Token
    service_timeout:
      name: Service call timeout (s)
    dry_run:
      name: Dry-run mode

  lmstudio:
    name: LM Studio
    description: "Local LLM server (OpenAI-compatible). Required when Voice Gateway or Telegram Bot is enabled. | URL: Required. e.g. http://192.168.1.10:1234. | Model: Required. Must be loaded in LM Studio. | API Key: Leave empty if LM Studio has no auth. | Timeout: Default 30 s. | Temperature: Default 0.1, lower = more reliable. | Suppress think tags: Enable for reasoning models (QwQ, DeepSeek-R1). | Context length: Default 8000, only relevant for fallback mode 2. | MCP allowed tools: Comma-separated whitelist, empty = all. | Max actions: 0 = unlimited."
    url:
      name: URL
    model:
      name: Model
    api_key:
      name: API Key
    timeout:
      name: Timeout (s)
    temperature:
      name: Temperature
    no_think:
      name: Suppress think tags
    context_length:
      name: Context length
    mcp_allowed_tools:
      name: MCP allowed tools
    max_actions_per_command:
      name: Max actions per command

  whisper:
    name: Whisper (Speech-to-Text)
    description: "External STT server (OpenAI-compatible). Leave empty for text-only operation. | URL: e.g. http://192.168.1.10:10300/v1/audio/transcriptions. Leave empty to disable voice input. | Model: Must match what the server has loaded."
    url:
      name: URL
    model:
      name: Model

  tts:
    name: TTS (Text-to-Speech)
    description: "External TTS server for voice replies. Leave empty to return text-only JSON. | URL: e.g. http://192.168.1.10:10400/tts. Leave empty to disable TTS. | Voice: Voice ID sent to the server, e.g. de_DE-thorsten-low."
    url:
      name: URL
    voice:
      name: Voice ID

  gateways:
    name: Gateway Ports & Auth
    description: "Network settings for Voice and Notify Gateway. | Voice port: Default 8765. If changed, also update the Network section. | Voice API key: Optional. When set, clients must send X-Api-Key header. | Forward to Telegram: Sends a Telegram message for every voice command. | Include transcript: Adds recognised speech text to the Telegram receipt. | Notify port: Default 8766. | Notify timeout: Default 10 s."
    voice_port:
      name: Voice Gateway port
    voice_api_key:
      name: Voice Gateway API key
    voice_telegram_push:
      name: Forward voice replies to Telegram
    voice_reply_with_transcript:
      name: Include transcript in voice reply
    notify_port:
      name: Notify Gateway port
    notify_http_timeout:
      name: Notify HTTP timeout (s)

  rag:
    name: RAG (Entity Retrieval)
    description: "Semantic vector search over HA entities. After changing entities send /rag_rebuild in Telegram. | Enable: When off, only entities.yaml is used. | Top-K: Entities returned per request. Default 15. | Keyword boost: 0 = pure vector, default 0.3. | Distance threshold: 0 = off (default). | Embed URL: Leave empty to reuse LM Studio URL. | Embed API key: Leave empty to reuse LM Studio key. | Embed model: Default text-embedding-nomic-embed-text-v2-moe. | Embed dim: Default 768. Changing this triggers index rebuild."
    enabled:
      name: Enable RAG
    top_k:
      name: Top-K candidates
    keyword_boost:
      name: Keyword boost
    distance_threshold:
      name: Distance threshold
    embed_url:
      name: Embedding URL
    embed_api_key:
      name: Embedding API key
    embed_model:
      name: Embedding model
    embed_dim:
      name: Embedding dimension

  preprocessor:
    name: LLM Preprocessor
    description: "Small extra LLM call before the main pipeline. Classifies intent, fixes STT errors, rewrites query for better RAG results. | Enable: One extra LLM call per request. | URL / API key / Model: Leave empty to reuse LM Studio settings. A small fast model is recommended (e.g. Qwen 1.5B). | Timeout: Default 30 s. | Temperature: Default 0.1."
    enabled:
      name: Enable Preprocessor
    url:
      name: URL
    api_key:
      name: API key
    model:
      name: Model
    timeout:
      name: Timeout (s)
    temperature:
      name: Temperature

  advanced:
    name: Fallback & History
    description: "What to do when no entity matches, and how much conversation history the LLM sees. | Fallback mode: 0 = error (default), 1 = fetch all live states and retry (beta), 2 = hand off to LM Studio with MCP tools (beta). | Fallback max entities: 0 = no limit. | Fallback domains: Comma-separated HA domains for mode-1 fallback. | History size: Past user turns the LLM sees. 0 = off. | Include assistant replies: LLM also sees its own previous replies. | Append executions: Adds executed HA actions to history."
    fallback_mode:
      name: Fallback mode
    fallback_rest_max_entities:
      name: Fallback REST max entities
    fallback_rest_domains:
      name: Fallback REST domains
    history_size:
      name: Conversation history size
    history_include_assistant:
      name: Include assistant replies in history
    history_append_executions:
      name: Append executed actions to history
