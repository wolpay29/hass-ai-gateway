services:
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: faster-whisper-server
    environment:
      # Model configuration
      - WHISPER__MODEL=deepdml/faster-whisper-large-v3-turbo-ct2

      # GPU configuration
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=float16

      # Performance: never unload model
      - WHISPER__TTL=-1

      # Language & VAD
      - WHISPER__LANGUAGE=de
      - WHISPER__USE_VAD=true
    volumes:
      - ./model-cache:/root/.cache/huggingface
    ports:
      - "10300:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
