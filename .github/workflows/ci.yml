name: Bot Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run pytest & generate report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: bots/telegram_bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            bots/telegram_bot/requirements.txt
            bots/telegram_bot/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest
        # keep going so reports are always uploaded even when tests fail
        continue-on-error: true
        id: run_tests

      - name: Write job summary
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET, os

          try:
              tree = ET.parse("test-results.xml")
              root = tree.getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")

              total   = int(suite.attrib.get("tests", 0))
              failed  = int(suite.attrib.get("failures", 0))
              errors  = int(suite.attrib.get("errors", 0))
              skipped = int(suite.attrib.get("skipped", 0))
              passed  = total - failed - errors - skipped

              lines = [
                  "## Test Report\n",
                  f"| | Count |",
                  f"|---|---|",
                  f"| ✅ Passed  | {passed} |",
                  f"| ❌ Failed  | {failed + errors} |",
                  f"| ⏭️ Skipped | {skipped} |",
                  f"| **Total**  | **{total}** |",
                  "",
                  "### Function Results\n",
                  "| Status | Test | Duration |",
                  "|--------|------|----------|",
              ]

              for tc in suite.findall("testcase"):
                  name     = f"{tc.attrib.get('classname', '')}.{tc.attrib.get('name', '')}"
                  duration = f"{float(tc.attrib.get('time', 0)):.3f}s"
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      icon = "❌"
                  elif tc.find("skipped") is not None:
                      icon = "⏭️"
                  else:
                      icon = "✅"
                  lines.append(f"| {icon} | `{name}` | {duration} |")

              summary = os.environ["GITHUB_STEP_SUMMARY"]
              with open(summary, "a") as f:
                  f.write("\n".join(lines) + "\n")
          except Exception as e:
              print(f"Could not write summary: {e}")
          EOF

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            bots/telegram_bot/test-report.html
            bots/telegram_bot/test-results.xml
            bots/telegram_bot/coverage-report/
          retention-days: 30

      - name: Publish test results (inline PR check)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: pytest results
          path: bots/telegram_bot/test-results.xml
          reporter: java-junit
          fail-on-error: true
