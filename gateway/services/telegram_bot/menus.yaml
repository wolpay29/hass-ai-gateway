# Telegram Bot Menu Configuration
# Edit this file to change the bot's buttons, menus, and Home Assistant automations.
# No code changes needed — just restart the bot after editing.
#
# Structure:
#   main_menu.layout  — rows of persistent reply-keyboard buttons
#   menus             — per-button config: either a submenu (rows) or a special action
#   battery_notification_menu — inline buttons shown with battery alerts
#
# Each inline button supports two ways to call Home Assistant:
#   automation: automation.your_automation_id        — triggers an automation
#   service: light.turn_on                           — calls any HA service directly
#   entity_id: light.wohnzimmer                     — required when using service
#
# Submenu titles support live HA state placeholders:
#   title: "Batterie: {sensor.my_battery}%"         — replaced with current HA state at runtime

main_menu:
  layout:
    - ["🚪 TOR-Steuerung", "🏊 Pool-Steuerung"]
    - ["🪟 Rollo-Steuerung", "🔋 Batterie prüfen"]

menus:
  "🚪 TOR-Steuerung":
    title: "🚪 TOR-Optionen wählen:"
    rows:
      - - label: "🚶 Tor Geh"
          callback_data: tor_geh
          automation: automation.trigger_tor_geh
          response: "✅ Tor Geh wird ausgelöst..."
      - - label: "🔒 Tor Geh Fix"
          callback_data: tor_geh_fix
          automation: automation.trigger_tor_geh_fix
          response: "✅ Tor Geh Fix wird ausgelöst..."
      - - label: "🚗 Tor Auto"
          callback_data: tor_auto
          automation: automation.trigger_tor_auto
          response: "✅ Tor Auto wird ausgelöst..."
      - - label: "🔧 Tor Auto Fix"
          callback_data: tor_auto_fix
          automation: automation.trigger_tor_auto_fix
          response: "✅ Tor Auto Fix wird ausgelöst..."

  "🏊 Pool-Steuerung":
    title: "🏊 Pool-Steuerung:"
    rows:
      - - label: "💧 Pump ON"
          callback_data: pool_pump_on
          automation: automation.trigger_pool_pump_on
          response: "✅ Pool-Pumpe EIN"
      - - label: "💧 Pump OFF"
          callback_data: pool_pump_off
          automation: automation.trigger_pool_pump_off
          response: "✅ Pool-Pumpe AUS"
      - - label: "🔥 Heat Pool"
          callback_data: pool_heat_on
          automation: automation.trigger_pool_heat_pump_on
          response: "🔥 Pool-Heizung EIN"
      - - label: "❄️ Heat OFF"
          callback_data: pool_heat_off
          automation: automation.trigger_pool_heat_pump_off
          response: "❄️ Pool-Heizung AUS"

  "🪟 Rollo-Steuerung":
    title: "🪟 Rollo-Steuerung:"
    rows:
      - - label: "⬇️ Alle AB"
          callback_data: rollo_alle_ab
          service: switch.turn_on
          entity_id: switch.alle_rollos_ab
          response: "✅ Alle Rollos fahren AB"
        - label: "⬆️ Alle AUF"
          callback_data: rollo_alle_auf
          service: switch.turn_on
          entity_id: switch.alle_rollos_auf
          response: "✅ Alle Rollos fahren AUF"
      - - label: "⬇️ EG AB"
          callback_data: rollo_eg_ab
          service: switch.turn_on
          entity_id: switch.rollo_eg_ab
          response: "✅ Rollo EG fährt AB"
        - label: "⬆️ EG AUF"
          callback_data: rollo_eg_auf
          service: switch.turn_on
          entity_id: switch.rollo_eg_auf
          response: "✅ Rollo EG fährt AUF"
      - - label: "⬇️ OG AB"
          callback_data: rollo_og_ab
          service: switch.turn_on
          entity_id: switch.rollo_og_ab
          response: "✅ Rollo OG fährt AB"
        - label: "⬆️ OG AUF"
          callback_data: rollo_og_auf
          service: switch.turn_on
          entity_id: switch.rollo_og_auf
          response: "✅ Rollo OG fährt AUF"

  "🔋 Batterie prüfen":
    title: "🔋 Batterie: {sensor.sn_3015651602_battery_soc_total}%\n☀️ PV-Überschuss: {sensor.sn_3015651602_metering_power_supplied} W\n\n⚡ Pool-Heizung einschalten?"
    rows:
      - - label: "🔥 Heat Pool"
          callback_data: battery_heat_pool
          automation: automation.trigger_pool_heat_pump_on
          response: "🔥 Pool-Heizung wurde eingeschaltet."
      - - label: "❌ Ignore"
          callback_data: battery_ignore
          response: "Benachrichtigung ignoriert."
